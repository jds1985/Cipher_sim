<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cipher OS</title>

<!-- ✅ SHARE CARD META (ADDED) -->
<meta property="og:title" content="Cipher OS" />
<meta property="og:description" content="A cognitive AI system that combines models, memory, and real-time reasoning." />
<meta property="og:image" content="https://ciphers.app/images/cipher-share.png" />
<meta property="og:url" content="https://ciphers.app" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />

<style>

body{
margin:0;
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;

/* ✅ BACKGROUND IMAGE + OVERLAY */
background:
linear-gradient(rgba(5,5,16,0.45), rgba(5,5,16,0.55)),
url("/images/cipher-hero-desktop.webp") center center / cover no-repeat fixed;
}

h1{
font-size:56px;
color:#9d7bff;
letter-spacing:4px;
}

.countdown{
display:flex;
gap:20px;
margin:30px;
}

.box{
background:#121222;
padding:20px;
border-radius:10px;
min-width:80px;
}

.num{
font-size:32px;
}

input{
padding:12px;
border-radius:6px;
border:none;
width:250px;
}

button{
padding:12px 18px;
margin-left:10px;
border:none;
border-radius:6px;
background:#9d7bff;
color:white;
cursor:pointer;
}

/* ✅ CAROUSEL CARD STYLE */
#carousel{
margin-top:15px;
max-width:320px;
padding:14px;
border-radius:10px;
background:rgba(20,20,40,0.5);
backdrop-filter: blur(8px);
border:1px solid rgba(255,255,255,0.08);
font-size:14px;
color:rgba(255,255,255,0.9);
transition:opacity 0.3s ease;
}

</style>

</head>

<body>

<h1>CIPHER OS</h1>

<p>The Cognitive Operating System</p>

<!-- ✅ CAROUSEL -->
<div id="carousel">
Cipher OS is a cognitive AI system
</div>

<div class="countdown">

<div class="box">
<div class="num" id="days">0</div>
Days
</div>

<div class="box">
<div class="num" id="hours">0</div>
Hours
</div>

<div class="box">
<div class="num" id="minutes">0</div>
Minutes
</div>

<div class="box">
<div class="num" id="seconds">0</div>
Seconds
</div>

</div>

<input id="email" placeholder="Enter email">

<button onclick="join()">Join Waitlist</button>
<button onclick="shareApp()" style="margin-top:10px; background:#1a1a2e;">
Share Cipher
</button>
  
<p><span id="count">0</span> early users joined</p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyDiToKj76nxjfXWhLiXgDS6VE8K86OFfiQ",
projectId: "digisoul1111"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

async function loadCount(){

const snap = await getDocs(collection(db,"cipher_waitlist"))

document.getElementById("count").innerText = snap.size

}

loadCount()

window.join = async function(){

const email = document.getElementById("email").value

if(!email) return

await addDoc(collection(db,"cipher_waitlist"),{
email,
time:Date.now()
})

document.getElementById("email").value=""

loadCount()

}

</script>

<script>
const params = new URLSearchParams(window.location.search);

if(params.get("dev") === "cipher"){
  localStorage.setItem("cipher_dev_access", "granted");
  window.location.href = "/";
}
  
/* ✅ COUNTDOWN */
const launchDate = new Date("2026-03-23T13:00:00").getTime()

setInterval(()=>{

const now = new Date().getTime()
const diff = launchDate-now

if(diff <= 0) return

document.getElementById("days").innerText =
Math.floor(diff/(1000*60*60*24))

document.getElementById("hours").innerText =
Math.floor((diff%(1000*60*60*24))/(1000*60*60))

document.getElementById("minutes").innerText =
Math.floor((diff%(1000*60*60))/(1000*60))

document.getElementById("seconds").innerText =
Math.floor((diff%(1000*60))/1000)

},1000)

/* ✅ CAROUSEL LOGIC */
const messages = [
"Cipher OS is a cognitive AI system",
"Choose the AI model you want to use",
"Combines multiple models into one system",
"Built with memory and real-time reasoning",
"Designed to think with you, not for you"
]

let index = 0
const el = document.getElementById("carousel")

setInterval(()=>{
index = (index + 1) % messages.length

el.style.opacity = 0

setTimeout(()=>{
el.innerText = messages[index]
el.style.opacity = 1
},300)

},3000)

/* ✅ SHARE FUNCTION */
function shareApp(){

if(navigator.share){
navigator.share({
title:"Cipher OS",
text:"Check out Cipher OS — a new cognitive AI system",
url:window.location.href
})
}else{
alert("Sharing not supported on this device")
}

}

</script>

</body>
</html>
