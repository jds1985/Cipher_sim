<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cipher CTS</title>

<meta property="og:title" content="Cipher CTS" />
<meta property="og:description" content="A cognitive AI system that combines models, memory, and real-time reasoning." />
<meta property="og:image" content="https://ciphercts.com/images/cipher-share.jpg" />
<meta property="og:url" content="https://ciphercts.com" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Orbitron',sans-serif;
color:white;

min-height:100vh;

display:flex;
justify-content:flex-start;
align-items:center;
flex-direction:column;

padding:70px 20px 60px;

overflow-x:hidden;

background:
linear-gradient(
rgba(3,3,10,0.55),
rgba(3,3,10,0.72)
),
url("/images/cipher-cts-bg.png");

background-size:contain;
background-position:center top;
background-repeat:no-repeat;
background-color:#02030a;

text-align:center;

}

/* MAIN WRAPPER */

.container{
width:100%;
max-width:500px;

display:flex;
flex-direction:column;
align-items:center;
}

/* TAGLINE */

.subtitle{

font-size:18px;
letter-spacing:4px;

color:rgba(255,255,255,0.82);

margin-top:250px;
margin-bottom:42px;

line-height:1.5;

}

/* COMING SOON */

#comingSoon{

font-size:54px;
font-weight:700;

letter-spacing:8px;

color:#d8c7ff;

line-height:1.1;

text-shadow:
0 0 8px rgba(164,130,255,0.7),
0 0 22px rgba(164,130,255,0.35);

margin-bottom:42px;

}

/* CAROUSEL */

#carousel{

width:100%;
max-width:420px;

padding:28px 24px;

border-radius:24px;

background:rgba(10,10,20,0.78);

border:1px solid rgba(140,120,255,0.16);

backdrop-filter:blur(12px);

box-shadow:
0 0 30px rgba(120,80,255,0.12);

font-size:16px;
line-height:1.6;

color:white;

margin-bottom:42px;

transition:opacity 0.3s ease;

}

/* INPUT AREA */

.inputRow{

width:100%;

display:flex;
flex-direction:column;
align-items:center;

gap:22px;

margin-bottom:34px;

}

input{

width:100%;
max-width:380px;

padding:24px 24px;

border:none;
border-radius:22px;

background:rgba(255,255,255,0.92);

font-family:'Orbitron',sans-serif;

font-size:18px;

color:#222;

outline:none;

}

/* BUTTONS */

button{

width:100%;
max-width:330px;

padding:22px 24px;

border:none;
border-radius:22px;

font-family:'Orbitron',sans-serif;
font-size:18px;

cursor:pointer;

transition:0.25s ease;

}

button:hover{
transform:translateY(-2px);
}

/* JOIN BUTTON */

.joinBtn{

background:linear-gradient(
135deg,
#7446ff,
#8b66ff
);

color:white;

box-shadow:
0 0 24px rgba(120,80,255,0.3);

}

/* SHARE BUTTON */

#shareBtn{

background:rgba(20,20,40,0.9);

border:1px solid rgba(255,255,255,0.06);

color:white;

margin-top:10px;
margin-bottom:36px;

}

/* COUNT */

#countWrap{

font-size:16px;

color:rgba(255,255,255,0.75);

margin-bottom:40px;

}

/* MOBILE */

@media(max-width:600px){

body{
padding-top:60px;
}

.subtitle{

font-size:14px;

letter-spacing:3px;

margin-top:230px;
margin-bottom:36px;

}

#comingSoon{

font-size:42px;

letter-spacing:6px;

margin-bottom:36px;

}

#carousel{

font-size:15px;

padding:24px 20px;

margin-bottom:36px;

}

input{

font-size:16px;

padding:22px 20px;

}

button{

font-size:16px;

padding:20px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="subtitle">
THE COGNITIVE OPERATING SYSTEM
</div>

<div id="comingSoon">
COMING SOON
</div>

<div id="carousel">
A world's first cognitive system
</div>

<div class="inputRow">

<input
id="email"
placeholder="Enter email"
/>

<button class="joinBtn" onclick="join()">
Join Waitlist
</button>

</div>

<button id="shareBtn" onclick="shareApp()">
Share Cipher
</button>

<div id="countWrap">
<span id="count">1000+</span> early users joined
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const firebaseConfig = {

apiKey:"AIzaSyDiToKj76nxjfXWhLiXgDS6VE8K86OFfiQ",
projectId:"digisoul1111"

}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

window.join = async function(){

const email = document.getElementById("email").value

if(!email) return

await addDoc(
collection(db,"cipher_waitlist"),
{
email,
time:Date.now()
}
)

document.getElementById("email").value=""

alert("Welcome to Cipher CTS ⚡")

}

</script>

<script>

// DEV KEY

const params = new URLSearchParams(window.location.search)

if(params.get("dev") === "cipher_vault_777"){

localStorage.setItem(
"cipher_dev_access",
"granted"
)

window.location.href="/"

}

// CAROUSEL

const messages = [

"A world's first cognitive system",
"Multiple minds. One interface.",
"The future of AI interaction",
"Not just AI. An operating system.",
"Cipher CTS is coming online",
"The world is not ready"

]

let index = 0

const el = document.getElementById("carousel")

setInterval(()=>{

index = (index + 1) % messages.length

el.style.opacity = 0

setTimeout(()=>{

el.innerText = messages[index]

el.style.opacity = 1

},300)

},3200)

// SHARE

function shareApp(){

if(navigator.share){

navigator.share({

title:"Cipher CTS",

text:"Check out Cipher CTS — a cognitive AI system",

url:window.location.href

})

}else{

alert("Sharing not supported on this device")

}

}

</script>

</body>
</html>
