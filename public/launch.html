<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cipher OS</title>

<!-- ✅ SHARE CARD META (FIXED DOMAIN) -->
<meta property="og:title" content="Cipher OS" />
<meta property="og:description" content="A cognitive AI system that combines models, memory, and real-time reasoning." />
<meta property="og:image" content="https://cipheros.app/images/cipher-share.jpg" />
<meta property="og:url" content="https://cipheros.app" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />

<style>

body{
margin:0;
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;

/* ✅ BACKGROUND IMAGE + OVERLAY */
background:
linear-gradient(rgba(5,5,16,0.45), rgba(5,5,16,0.55)),
url("/images/cipher-hero-desktop.webp") center center / cover no-repeat fixed;
}

h1{
font-size:56px;
color:#9d7bff;
letter-spacing:4px;
}

.countdown{
display:flex;
gap:20px;
margin:30px;
}

.box{
background:#121222;
padding:20px;
border-radius:10px;
min-width:80px;
}

.num{
font-size:32px;
}

input{
padding:12px;
border-radius:6px;
border:none;
width:250px;
}

button{
padding:12px 18px;
margin-left:10px;
border:none;
border-radius:6px;
background:#9d7bff;
color:white;
cursor:pointer;
}

/* ✅ CAROUSEL */
#carousel{
margin-top:15px;
max-width:320px;
padding:14px;
border-radius:10px;
background:rgba(20,20,40,0.5);
backdrop-filter: blur(8px);
border:1px solid rgba(255,255,255,0.08);
font-size:14px;
color:rgba(255,255,255,0.9);
transition:opacity 0.3s ease;
box-shadow: 0 0 20px rgba(157,123,255,0.15);
animation: pulse 4s ease-in-out infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.85;}
}

/* 🌌 BLACK HOLE */
#blackhole{
position:fixed;
top:20px;
right:20px;
width:120px;
height:120px;
pointer-events:none;
z-index:5;
}

#blackhole .core{
position:absolute;
width:60px;
height:60px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border-radius:50%;
background:black;
box-shadow:
0 0 25px rgba(157,123,255,0.6),
inset 0 0 20px rgba(0,0,0,0.9);
}

#blackhole .ring{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
border:2px solid rgba(157,123,255,0.2);
animation:spin 6s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.particle{
position:absolute;
width:4px;
height:4px;
background:#9d7bff;
border-radius:50%;
opacity:0.8;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translate(0,0) scale(1);
opacity:1;
}
100%{
transform:translate(-40px,40px) scale(0.2);
opacity:0;
}
}

</style>

</head>

<body>

<!-- 🌌 BLACK HOLE -->
<div id="blackhole">
  <div class="ring"></div>
  <div class="core"></div>
</div>

<h1>CIPHER OS</h1>

<p>The Cognitive Operating System</p>

<!-- ✅ CAROUSEL -->
<div id="carousel">
Something massive is coming
</div>

<div class="countdown">

<div class="box">
<div class="num" id="days">0</div>
Days
</div>

<div class="box">
<div class="num" id="hours">0</div>
Hours
</div>

<div class="box">
<div class="num" id="minutes">0</div>
Minutes
</div>

<div class="box">
<div class="num" id="seconds">0</div>
Seconds
</div>

</div>

<input id="email" placeholder="Enter email">

<button onclick="join()">Join Waitlist</button>
<button onclick="shareApp()" style="margin-top:10px; background:#1a1a2e;">
Share Cipher
</button>
  
<p><span id="count">0</span> early users joined</p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyDiToKj76nxjfXWhLiXgDS6VE8K86OFfiQ",
projectId: "digisoul1111"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

// ✅ STATIC DISPLAY COUNT
document.getElementById("count").innerText = "1000+"

window.join = async function(){

const email = document.getElementById("email").value

if(!email) return

await addDoc(collection(db,"cipher_waitlist"),{
email,
time:Date.now()
})

document.getElementById("email").value=""

}

</script>

<script>

const params = new URLSearchParams(window.location.search);

if(params.get("dev") === "cipher"){
  localStorage.setItem("cipher_dev_access", "granted");
  window.location.href = "/";
}
  
/* ✅ COUNTDOWN */
const launchDate = new Date("2026-04-25T20:51:00").getTime()

setInterval(()=>{

const now = new Date().getTime()
const diff = launchDate-now

if(diff <= 0) return

document.getElementById("days").innerText =
Math.floor(diff/(1000*60*60*24))

document.getElementById("hours").innerText =
Math.floor((diff%(1000*60*60*24))/(1000*60*60))

document.getElementById("minutes").innerText =
Math.floor((diff%(1000*60*60))/(1000*60))

document.getElementById("seconds").innerText =
Math.floor((diff%(1000*60))/1000)

},1000)

/* ✅ CAROUSEL */
const messages = [
"Something massive is coming",
"The world is not ready",
"A world's first cognitive system",
"Not an AI tool — an operating system",
"Multiple minds. One interface.",
"This is where AI stops being separate",
"Cipher OS is about to change everything"
]

let index = 0
const el = document.getElementById("carousel")

setInterval(()=>{
index = (index + 1) % messages.length

el.style.opacity = 0

setTimeout(()=>{
el.innerText = messages[index]
el.style.opacity = 1
},300)

},3000)

/* 🌌 BLACK HOLE PARTICLES */
const hole = document.getElementById("blackhole")

function createParticle(){
  const p = document.createElement("div")
  p.className = "particle"

  p.style.left = Math.random()*120 + "px"
  p.style.top = Math.random()*120 + "px"
  p.style.animationDuration = (2 + Math.random()*2) + "s"

  hole.appendChild(p)

  setTimeout(()=>p.remove(),3000)
}

setInterval(createParticle, 150)

/* ✅ SHARE FUNCTION */
function shareApp(){

if(navigator.share){
navigator.share({
title:"Cipher OS",
text:"Check out Cipher OS — a new cognitive AI system",
url:window.location.href
})
}else{
alert("Sharing not supported on this device")
}

}

</script>

</body>
</html>
