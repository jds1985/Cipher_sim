<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cipher OS</title>

<meta property="og:title" content="Cipher OS" />
<meta property="og:description" content="A cognitive AI system that combines models, memory, and real-time reasoning." />
<meta property="og:image" content="https://cipheros.app/images/cipher-share.jpg" />
<meta property="og:url" content="https://cipheros.app" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', Arial;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;

background:
linear-gradient(rgba(5,5,16,0.45), rgba(5,5,16,0.55)),
url("/images/cipher-hero-desktop.webp") center center / cover no-repeat fixed;
}

h1{
font-size:56px;
color:#9d7bff;
letter-spacing:4px;
margin-bottom:10px;
}

#comingSoon{
font-size:34px;
margin-top:10px;
letter-spacing:6px;
color:#cbb7ff;
text-shadow:
0 0 8px rgba(157,123,255,0.6),
0 0 18px rgba(157,123,255,0.4);
}

/* INPUT + BUTTONS */
.inputRow{
margin-top:25px;
}

input{
padding:12px;
border-radius:6px;
border:none;
width:250px;
}

button{
padding:12px 18px;
margin-left:10px;
border:none;
border-radius:6px;
background:#9d7bff;
color:white;
cursor:pointer;
}

/* CAROUSEL */
#carousel{
margin-top:20px;
max-width:320px;
padding:14px;
border-radius:10px;
background:rgba(20,20,40,0.5);
backdrop-filter: blur(8px);
border:1px solid rgba(255,255,255,0.08);
font-size:14px;
color:rgba(255,255,255,0.9);
transition:opacity 0.3s ease;
box-shadow: 0 0 20px rgba(157,123,255,0.15);
}

/* BLACK HOLE */
#blackhole{
position:fixed;
top:20px;
right:20px;
width:120px;
height:120px;
pointer-events:none;
z-index:5;
}

#blackhole .core{
position:absolute;
width:60px;
height:60px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border-radius:50%;
background:black;
box-shadow:
0 0 25px rgba(157,123,255,0.6),
inset 0 0 20px rgba(0,0,0,0.9);
}

#blackhole .ring{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
border:2px solid rgba(157,123,255,0.2);
animation:spin 6s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.particle{
position:absolute;
width:4px;
height:4px;
background:#9d7bff;
border-radius:50%;
opacity:0.8;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translate(0,0);opacity:1;}
100%{transform:translate(-40px,40px);opacity:0;}
}

</style>

</head>

<body>

<div id="blackhole">
  <div class="ring"></div>
  <div class="core"></div>
</div>

<h1>CIPHER OS</h1>
<p>The Cognitive Operating System</p>

<div id="comingSoon">COMING SOON</div>

<div id="carousel">Something massive is coming</div>

<div class="inputRow">
<input id="email" placeholder="Enter email">
<button onclick="join()">Join Waitlist</button>
</div>

<button onclick="shareApp()" style="margin-top:10px; background:#1a1a2e;">
Share Cipher
</button>

<p><span id="count">0</span> early users joined</p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIzaSyDiToKj76nxjfXWhLiXgDS6VE8K86OFfiQ",
projectId: "digisoul1111"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

document.getElementById("count").innerText = "1000+"

window.join = async function(){

const email = document.getElementById("email").value
if(!email) return

await addDoc(collection(db,"cipher_waitlist"),{
email,
time:Date.now()
})

document.getElementById("email").value=""
}

</script>

<script>

// 🔐 DEV KEY UPDATED
const params = new URLSearchParams(window.location.search);

if(params.get("dev") === "cipher_vault_777"){
  localStorage.setItem("cipher_dev_access", "granted");
  window.location.href = "/";
}

// CAROUSEL
const messages = [
"Something massive is coming",
"The world is not ready",
"A world's first cognitive system",
"Not an AI tool — an operating system",
"Multiple minds. One interface.",
"This is where AI stops being separate",
"Cipher OS is about to change everything"
]

let index = 0
const el = document.getElementById("carousel")

setInterval(()=>{
index = (index + 1) % messages.length

el.style.opacity = 0

setTimeout(()=>{
el.innerText = messages[index]
el.style.opacity = 1
},300)

},3000)

// PARTICLES
const hole = document.getElementById("blackhole")

function createParticle(){
  const p = document.createElement("div")
  p.className = "particle"
  p.style.left = Math.random()*120 + "px"
  p.style.top = Math.random()*120 + "px"
  p.style.animationDuration = (2 + Math.random()*2) + "s"
  hole.appendChild(p)
  setTimeout(()=>p.remove(),3000)
}

setInterval(createParticle, 150)

// SHARE
function shareApp(){
if(navigator.share){
navigator.share({
title:"Cipher OS",
text:"Check out Cipher OS — a new cognitive AI system",
url:window.location.href
})
}else{
alert("Sharing not supported")
}
}

</script>

</body>
</html>
