<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cipher CTS</title>

<meta property="og:title" content="Cipher CTS" />
<meta property="og:description" content="A cognitive AI system that combines models, memory, and real-time reasoning." />
<meta property="og:image" content="https://cipheros.app/images/cipher-share.jpg" />
<meta property="og:url" content="https://cipheros.app" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', Arial;
color:white;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
padding-top:90px;
background:
linear-gradient(rgba(5,5,16,0.45), rgba(5,5,16,0.58)),
url("/images/cipher-cts-bg.png") center top / contain no-repeat fixed;

background-color:#04040b;

/* LOGO */
#logo{
width:420px;
max-width:90%;
margin-bottom:10px;
filter:
drop-shadow(0 0 10px rgba(0,255,255,0.15))
drop-shadow(0 0 20px rgba(157,123,255,0.18));
}

/* SUBTEXT */
.subtitle{
font-size:16px;
color:rgba(255,255,255,0.82);
margin-top:6px;
margin-bottom:18px;
letter-spacing:2px;
}

/* COMING SOON */
#comingSoon{
font-size:34px;
letter-spacing:8px;
color:#d7cbff;

text-shadow:
0 0 8px rgba(157,123,255,0.5),
0 0 18px rgba(157,123,255,0.35);

margin-bottom:22px;
}

/* CAROUSEL */
#carousel{
max-width:360px;
padding:16px;
border-radius:14px;

background:rgba(10,10,20,0.72);

backdrop-filter: blur(10px);

border:1px solid rgba(140,120,255,0.18);

font-size:14px;
line-height:1.6;

color:rgba(255,255,255,0.92);

transition:opacity 0.3s ease;

box-shadow:
0 0 20px rgba(157,123,255,0.12);

margin-bottom:24px;
}

/* INPUT AREA */
.inputRow{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:14px;
}

input{
padding:14px;
border-radius:10px;
border:none;
width:260px;

background:rgba(255,255,255,0.92);

font-family:'Orbitron', Arial;
outline:none;
}

/* BUTTONS */
button{
padding:14px 20px;
border:none;
border-radius:10px;

background:#7f5cff;
color:white;

cursor:pointer;

font-family:'Orbitron', Arial;

transition:0.25s ease;
}

button:hover{
transform:translateY(-2px);
background:#9476ff;
}

#shareBtn{
background:#17172a;
}

#shareBtn:hover{
background:#23233c;
}

/* USER COUNT */
#countWrap{
margin-top:14px;
font-size:14px;
color:rgba(255,255,255,0.7);
}

/* MOBILE */
@media(max-width:600px){

#comingSoon{
font-size:26px;
letter-spacing:5px;
}

#carousel{
max-width:85%;
font-size:13px;
}

input{
width:85%;
}

button{
width:85%;
}

.inputRow{
flex-direction:column;
align-items:center;
}
}

</style>

</head>

<body>

<!-- LOGO -->


<div class="subtitle">
THE COGNITIVE OPERATING SYSTEM
</div>

<div id="comingSoon">
COMING SOON
</div>

<!-- CAROUSEL -->
<div id="carousel">
Something massive is coming
</div>

<!-- EMAIL -->
<div class="inputRow">

<input id="email" placeholder="Enter email">

<button onclick="join()">
Join Waitlist
</button>

</div>

<!-- SHARE -->
<button id="shareBtn" onclick="shareApp()">
Share Cipher
</button>

<!-- USER COUNT -->
<div id="countWrap">
<span id="count">0</span> early users joined
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"

import {
getFirestore,
collection,
addDoc

} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const firebaseConfig = {

apiKey: "AIzaSyDiToKj76nxjfXWhLiXgDS6VE8K86OFfiQ",
projectId: "digisoul1111"

}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

document.getElementById("count").innerText = "1000+"

window.join = async function(){

const email = document.getElementById("email").value

if(!email) return

await addDoc(collection(db,"cipher_waitlist"),{

email,
time:Date.now()

})

document.getElementById("email").value=""

alert("Welcome to Cipher CTS ⚡")

}

</script>

<script>

// DEV KEY
const params = new URLSearchParams(window.location.search);

if(params.get("dev") === "cipher_vault_777"){

localStorage.setItem("cipher_dev_access", "granted");
window.location.href = "/";

}

// CAROUSEL
const messages = [

"Something massive is coming",
"The world is not ready",
"A world's first cognitive system",
"Not an AI tool — an operating system",
"Multiple minds. One interface.",
"This is where AI stops being separate",
"Cipher CTS is about to change everything"

]

let index = 0

const el = document.getElementById("carousel")

setInterval(()=>{

index = (index + 1) % messages.length

el.style.opacity = 0

setTimeout(()=>{

el.innerText = messages[index]
el.style.opacity = 1

},300)

},3000)

// SHARE
function shareApp(){

if(navigator.share){

navigator.share({

title:"Cipher CTS",
text:"Check out Cipher CTS — a new cognitive AI system",
url:window.location.href

})

}else{

alert("Sharing not supported on this device")

}

}

</script>

</body>
</html>
